name: Run pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install biopython pandas matplotlib snakemake pulp cutadapt scikit-learn

      - name: Install test dependencies
        run: pip install pytest

      - name: Run tests
        run: pytest  

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-dada2-${{ runner.os }}-${{ hashFiles('**/*.R') }}
          restore-keys: r-dada2-${{ runner.os }}-

      - name: Install system dependencies for DADA2
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev zlib1g-dev libbz2-dev liblzma-dev

      - name: Install DADA2
        run: |
          Rscript -e 'if (!requireNamespace("BiocManager", quietly = TRUE)) install.packages("BiocManager")'
          Rscript -e 'BiocManager::install("dada2", update = FALSE, ask = FALSE)'

      - name: Run Snakemake pipeline
        run: snakemake --cores 1